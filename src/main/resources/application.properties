spring.application.name=terminal-devilal
spring.datasource.url=jdbc:mysql://mysql:3306/stonks
spring.datasource.username=root
spring.datasource.password=av37hvgAv%123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

#HikariCP
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

#Logging
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.apache.kafka=ERROR

#Kafka 
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=devilal-group
spring.kafka.listener.type=batch
spring.kafka.consumer.max-poll-records=500
spring.kafka.consumer.fetch-min-size=1048576
spring.kafka.consumer.fetch-max-wait=500ms

# Scheduling
spring.task.scheduling.pool.size=5

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Python server 
python.script.root=F:/Apps/terminal-devilal/src/main/python
app.python.script.path=F:\\Apps\\terminal-devilal\\src\\main\\python\\server_start.bat

# API endpoints
batch-analysis-mann-kandell.api.url=http://python:8000/batch-analysis-mann-kandell